version: '3.8'
services:
  mnemo:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - ./notes:/app/notes
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/mnemo
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=mnemo
      - POSTGRES_PASSWORD=postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  pgdata:
