services:
  kryton:
    image: ghcr.io/piwi3910/kryton/kryton:latest
    ports:
      - "3100:3000"
    volumes:
      - ./notes:/notes
      - kryton-data:/data
    environment:
      - DATABASE_URL=file:/data/kryton.db
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:?Set BETTER_AUTH_SECRET}
      - APP_URL=${APP_URL:-http://localhost:3100}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL:-http://localhost:3100}
      - NOTES_DIR=/notes
    restart: unless-stopped

volumes:
  kryton-data:
